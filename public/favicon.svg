<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" fill="#0f0f12"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square container -->
  <rect x="20" y="20" width="152" height="152" rx="32" ry="32" fill="url(#grad2)" opacity="0.3"/>
  <rect x="28" y="28" width="136" height="136" rx="28" ry="28" fill="none" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Lightning bolt icon -->
  <g transform="translate(96, 96)">
    <!-- Bolt path -->
    <path d="M 0 -50 L 25 -15 L 15 0 L 40 50 L -5 20 L -15 35 Z" fill="url(#grad1)" stroke="none"/>
  </g>
  
  <!-- Glow effect -->
  <circle cx="96" cy="96" r="40" fill="url(#grad1)" opacity="0.1" filter="url(#blur)"/>
  <defs>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
    </filter>
  </defs>
</svg>
